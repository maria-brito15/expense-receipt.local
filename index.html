<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>recibo — entradas &amp; saídas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="light">
    <div class="topbar">
      <div class="brand">recibo · entradas &amp; saídas</div>
      <button class="theme-toggle" id="themeToggle">modo escuro</button>
    </div>

    <div class="receipt" id="receipt">
      <div class="receipt-head">
        <h1>recibo de gastos</h1>
        <div class="sub">controle simples · guardado no seu navegador</div>
        <input
          type="text"
          id="monthLabel"
          class="month-input"
          placeholder="ex: gastos e ganhos de julho"
          value="gastos e ganhos de julho"
        />
      </div>

      <div class="form">
        <div class="row">
          <div class="field">
            <label>valor (r$)</label>
            <input
              type="number"
              id="valorInput"
              placeholder="0,00"
              step="0.01"
              min="0"
            />
          </div>
          <div class="field">
            <label>descrição</label>
            <input
              type="text"
              id="descInput"
              placeholder="ex: mensalidade spotify"
            />
          </div>
        </div>
        <div class="row">
          <div class="type-toggle">
            <button data-type="entrada" id="btnEntrada">+ entrada</button>
            <button data-type="saida" id="btnSaida" class="active">
              - saída
            </button>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>cor marca-texto</label>
            <div class="swatches" id="swatches"></div>
          </div>
        </div>
        <button class="add-btn" id="addBtn">adicionar ao recibo</button>
      </div>

      <div class="controls">
        <input type="text" id="searchInput" placeholder="buscar..." />
        <select id="sortSelect">
          <option value="date-desc">mais recente</option>
          <option value="date-asc">mais antigo</option>
          <option value="amount-desc">maior valor</option>
          <option value="amount-asc">menor valor</option>
          <option value="az">a–z</option>
        </select>
      </div>

      <div class="chips" id="chips"></div>

      <div class="ledger" id="ledger"></div>

      <div class="summary" id="summary"></div>

      <div class="footer-actions">
        <label for="importFile">importar csv</label>
        <input type="file" id="importFile" accept=".csv" />
        <button id="printBtn">exportar pdf</button>
      </div>

      <div class="stamp">— salvo automaticamente no localStorage —</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
